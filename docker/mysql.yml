# To start the database:
# docker compose -f mysql.yml up -d
# To view the logs (useful for troubleshooting):
# docker compose -f mysql.yml logs -f
# To stop the database:
# docker compose -f mysql.yml stop
# To tear down the database completely:
# docker compose -f mysql.yml down
# To connect (MySQL protocol):
# mysql -h 127.0.0.1 -P 3306 -u smf -psmf smf
services:
  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: smf
      MYSQL_USER: smf
      MYSQL_PASSWORD: smf
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

volumes:
  mysql-data:

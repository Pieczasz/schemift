# To start the database:
# docker compose -f oracle.yml up -d
# To view the logs (useful for troubleshooting):
# docker compose -f oracle.yml logs -f
# To stop the database:
# docker compose -f oracle.yml stop
# To tear down the database completely:
# docker compose -f oracle.yml down
# To connect (Oracle protocol, service FREEPDB1):
# sqlplus smf/smf@//127.0.0.1:1521/FREEPDB1
services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: smf
      APP_USER_PASSWORD: smf
    volumes:
      - oracle-data:/opt/oracle/oradata
    restart: unless-stopped

volumes:
  oracle-data:

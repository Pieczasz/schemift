# IBM Db2 Community Edition (for local testing)
# NOTE: Db2 only ships amd64 images. On Apple Silicon (M1/M2/M3/M4) Docker
#       Desktop will run x86 emulation automatically via Rosetta.
#       Make sure Docker Desktop -> Settings -> General -> "Use Rosetta for x86_64/amd64
#       emulation on Apple Silicon" is ENABLED for much better performance.
#
# IMPORTANT: First startup takes 5–10 minutes while Db2 initialises.
#       Watch logs to know when it's ready.
#
# To start the database:
#   docker compose -f db2.yml up -d
#
# To watch initialization progress (wait for "Setup has completed"):
#   docker compose -f db2.yml logs -f
#
# To stop the database:
#   docker compose -f db2.yml stop
#
# To tear down completely (removes data):
#   docker compose -f db2.yml down -v
#
# To open a Db2 shell:
#   docker compose -f db2.yml exec db2 bash -c "su - db2inst1"
#
# To run SQL directly:
#   docker compose -f db2.yml exec db2 bash -c "su - db2inst1 -c 'db2 connect to smf && db2 \"SELECT 1 FROM SYSIBM.SYSDUMMY1\"'"
#
# Connection details (for Go / JDBC / ODBC):
#   Host:     127.0.0.1
#   Port:     50000
#   Database: smf
#   User:     db2inst1
#   Password: Password123
#   DSN:      DATABASE=smf;HOSTNAME=127.0.0.1;PORT=50000;PROTOCOL=TCPIP;UID=db2inst1;PWD=Password123;
services:
  db2:
    image: icr.io/db2_community/db2:11.5.9.0
    platform: linux/amd64
    privileged: true
    ports:
      - "50000:50000"
    environment:
      LICENSE: accept
      DB2INSTANCE: db2inst1
      DB2INST1_PASSWORD: Password123
      DBNAME: smf
      BLU: "false"
      ENABLE_ORACLE_COMPATIBILITY: "false"
      AUTOCONFIG: "false"
      ARCHIVE_LOGS: "false"
      TO_CREATE_SAMPLEDB: "false"
      REPODB: "false"
      IS_OSXFS: "true"
      PERSISTENT_HOME: "true"
      HADR_ENABLED: "false"
    volumes:
      - db2-data:/database
    healthcheck:
      test: ["CMD", "bash", "-c", "su - db2inst1 -c 'db2 connect to smf' > /dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 120s
    restart: unless-stopped

volumes:
  db2-data:

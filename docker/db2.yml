# TODO: this is some bullshit
# To start the database:
# docker compose -f db2.yml up -d
# To view the logs (useful for troubleshooting):
# docker compose -f db2.yml logs -f
# To stop the database:
# docker compose -f db2.yml stop
# To tear down the database completely:
# docker compose -f db2.yml down
# On Apple Silicon (M1/M2/M3), this image requires x86 emulation.
# Make sure Docker Desktop has amd64 emulation enabled.
# To open a shell as db2inst1:
# docker compose -f db2.yml exec -u db2inst1 db2 bash
# Note: IBM Db2 container requires Docker to allow privileged containers.
services:
  db2:
    image: icr.io/db2_community/db2:11.5.9.0
    platform: linux/amd64
    privileged: true
    ports:
      - "50000:50000"
    environment:
      LICENSE: accept
      DB2INST1_PASSWORD: Password123
      DBNAME: smf
      AUTOCONFIG: "true"
    volumes:
      - db2-data:/database
    restart: unless-stopped

volumes:
  db2-data:

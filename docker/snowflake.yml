# TODO: localstak token
# To start the container:
# docker compose -f snowflake.yml up -d
# To view the logs (useful for troubleshooting):
# docker compose -f snowflake.yml logs -f
# To stop the container:
# docker compose -f snowflake.yml stop
# To tear down the setup completely:
# docker compose -f snowflake.yml down
# This image requires a LocalStack token for Snowflake emulator:
# LOCALSTACK_AUTH_TOKEN=your_token docker compose -f snowflake.yml up -d
# To open a shell in the container:
# docker compose -f snowflake.yml exec snowflake sh
# Note: This uses local Snowflake emulation via localstack/snowflake.
services:
  snowflake:
    image: localstack/snowflake:latest
    ports:
      - "4566:4566"
    environment:
      LOCALSTACK_AUTH_TOKEN: your_token
      SNOWFLAKE_ACCOUNT: localstack
      SNOWFLAKE_USER: smf
      SNOWFLAKE_PASSWORD: smf
      SNOWFLAKE_DATABASE: smf
      SNOWFLAKE_SCHEMA: PUBLIC
      SNOWFLAKE_WAREHOUSE: compute_wh
      SNOWFLAKE_ROLE: accountadmin
    restart: unless-stopped

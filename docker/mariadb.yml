# To start the database:
# docker compose -f mariadb.yml up -d
# To view the logs (useful for troubleshooting):
# docker compose -f mariadb.yml logs -f
# To stop the database:
# docker compose -f mariadb.yml stop
# To tear down the database completely:
# docker compose -f mariadb.yml down
# To connect (MariaDB protocol):
# mariadb -h 127.0.0.1 -P 3307 -u smf -psmf smf
services:
  mariadb:
    image: mariadb:11
    ports:
      - "3307:3306"
    environment:
      MARIADB_DATABASE: smf
      MARIADB_USER: smf
      MARIADB_PASSWORD: smf
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

volumes:
  mariadb-data:

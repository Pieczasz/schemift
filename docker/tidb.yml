# To start the cluster:
# docker compose -f tidb.yml up -d
# To view the logs (useful for troubleshooting):
# docker compose -f tidb.yml logs -f
# To stop the cluster:
# docker compose -f tidb.yml stop
# To tear down the cluster completely:
# docker compose -f tidb.yml down
# To connect (MySQL protocol):
# mysql -h 127.0.0.1 -P 4000 -u root
services:
  pd:
    image: pingcap/pd:v8.5.5
    ports:
      - "2379:2379"
    command:
      - --name=pd
      - --client-urls=http://0.0.0.0:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-client-urls=http://pd:2379
      - --advertise-peer-urls=http://pd:2380
      - --initial-cluster=pd=http://pd:2380
      - --data-dir=/data/pd
    volumes:
      - pd-data:/data
    networks:
      - tidb-cluster
    restart: always

  tikv:
    image: pingcap/tikv:v8.5.5
    command:
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --data-dir=/data/tikv
      - --pd-endpoints=pd:2379
    volumes:
      - tikv-data:/data
    depends_on:
      - pd
    networks:
      - tidb-cluster
    restart: always

  tidb:
    image: pingcap/tidb:v8.5.5
    ports:
      - "4000:4000" # MySQL client connection port
      - "10080:10080" # TiDB status/metrics port
    command:
      - --store=tikv
      - --path=pd:2379
    depends_on:
      - tikv
    networks:
      - tidb-cluster
    restart: always

volumes:
  pd-data:
  tikv-data:

networks:
  tidb-cluster:

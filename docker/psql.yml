# To start the database:
# docker compose -f psql.yml up -d
# To view the logs (useful for troubleshooting):
# docker compose -f psql.yml logs -f
# To stop the database:
# docker compose -f psql.yml stop
# To tear down the database completely:
# docker compose -f psql.yml down
# To connect (PostgreSQL protocol):
# PGPASSWORD=smf psql -h 127.0.0.1 -p 5433 -U smf -d smf
services:
  postgresql:
    image: postgres:18
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: smf
      POSTGRES_USER: smf
      POSTGRES_PASSWORD: smf
    volumes:
      - postgresql-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smf -d smf"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgresql-data:

# To start the database:
# docker compose -f mssql.yml up -d
# To view the logs (useful for troubleshooting):
# docker compose -f mssql.yml logs -f
# To stop the database:
# docker compose -f mssql.yml stop
# To tear down the database completely:
# docker compose -f mssql.yml down
# To connect (SQL Server protocol):
# sqlcmd -S 127.0.0.1,1433 -U sa -P 'Your_strong_password123' -C
services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_password123"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -C"]
      interval: 15s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  mssql-data:

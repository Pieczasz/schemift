# To start the helper container:
# docker compose -f sqlite.yml up -d
# To view the logs (useful for troubleshooting):
# docker compose -f sqlite.yml logs -f
# To stop the helper container:
# docker compose -f sqlite.yml stop
# To tear down the setup completely:
# docker compose -f sqlite.yml down
# To connect (SQLite is file-based, inside helper container):
# docker compose -f sqlite.yml exec sqlite sqlite3 /data/smf.db
# Note: SQLite is file-based, so this starts a helper container that keeps a DB file in a Docker volume.
services:
  sqlite:
    image: keinos/sqlite3:latest
    command: >
      sh -c "
      sqlite3 /data/smf.db 'PRAGMA journal_mode=WAL;' &&
      tail -f /dev/null
      "
    volumes:
      - sqlite-data:/data
    restart: unless-stopped

volumes:
  sqlite-data:
